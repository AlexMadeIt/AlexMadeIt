        <section id="contact" class="section-bg">
    <h2>Contact</h2>
        <p>Entry-level IT learner focused on growth and hands on experience. <br>
        Let's connect.</p>
            <form class="contact-form" action="#" method="post">
        <div class="form-row">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your name" required>
        </div>
        <div class="form-row">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>
        <div class="form-row">
            <label for="topic">Topic</label>
            <input type="text" id="topic" name="topic" placeholder="What is this about?">
        </div>
        <div class="form-row">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" cols="40" placeholder="Write your message here..." required></textarea>
        </div>
        <div class="form-row">
            <label for="reason">Reason for Contact</label>
            <select id="reason" name="reason">
                <option value="general">General Question</option>
                <option value="portfolio">Portfolio Feedback</option>
                <option value="networking">Networking</option>
                <option value="opportunity">Opportunity</option>
            </select>
        </div>
        <div class="form-row checkbox-row">
            <input type="checkbox" id="updates" name="updates">
            <label for="updates">Send me updates</label>
        </div>

        <div class="form-row">
            <button type="submit" class="submit-btn">Send Message</button>
        </div>
    </form>
    <div class="contact-container">
        <a href="https://mail.google.com/mail/?view=cm&fs=1&to=alexdamon45@gmail.com"

        </a>
    </div>
